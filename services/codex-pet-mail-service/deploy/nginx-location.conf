# Add these locations inside the existing HTTPS server block.
location = /codex-pet-mail/healthz {
    proxy_pass http://127.0.0.1:8789/healthz;
    proxy_connect_timeout 3s;
    proxy_read_timeout 5s;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /codex-pet-mail/v1/verification-code {
    limit_except POST { deny all; }
    client_max_body_size 4k;
    proxy_pass http://127.0.0.1:8789/v1/verification-code;
    proxy_connect_timeout 3s;
    proxy_read_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
